# grafana.yaml (Dashboard Provisioning)
apiVersion: 1
providers:
  - name: 'ML SLO Dashboards'
    orgId: 1
    folder: 'ML Monitoring'
    folderUid: 'ml-folder'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards # Путь внутри контейнера, куда положим JSON
      foldersFromFilesStructure: false
